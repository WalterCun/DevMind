# devmind-core/pytest.ini
[pytest]
# Plugins
addopts =
    --verbose
    --tb=short
    --cov=core
    --cov-report=term-missing
    -p no:warnings
    --ds=db.settings

asyncio_mode = auto
asyncio_default_fixture_loop_scope = function

# Django settings
DJANGO_SETTINGS_MODULE = db.settings

# Python path
python_files = tests/*.py test_*.py *_test.py
python_classes = Test*
python_functions = test_*

# Environment variables for testing - FORZAR SQLITE
env =
    DJANGO_DEBUG=True
    DEVMENT_TEST_USE_SQLITE=True
    LOG_LEVEL=WARNING
    POSTGRES_HOST=
    DATABASE_URL=sqlite:///test_devmind.db

# Markers
markers =
    slow: marks tests as slow (deselect with '-m "not slow"')
    integration: marks tests as integration tests (requires external services)
    requires_ollama: marks tests that need Ollama running
    requires_docker: marks tests that need Docker running
    requires_postgres: marks tests that need PostgreSQL running

# Filter warnings
filterwarnings =
    ignore::DeprecationWarning
    ignore::PendingDeprecationWarning